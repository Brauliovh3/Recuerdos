<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Álbum del cole</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@600&display=swap');
    :root {
      color-scheme: light;
      --hero-img: url('./src/fondo.jpeg');
      --ink: #f6f6f6;
      --accent: rgba(255,255,255,0.82);
      --muted: rgba(255,255,255,0.8);
      --panel: #ffffff;
      --shadow: 0 26px 60px rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0f0f0f;
      font-family: 'Montserrat', 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #0f0f0f;
    }
    .hero {
      min-height: 100vh;
      background: linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.55) 100%), var(--hero-img) center/cover no-repeat;
      display: grid;
      place-items: center;
      text-align: center;
      position: relative;
      color: #fff;
      padding: 30px;
    }
    .hero__content {
      max-width: 820px;
      display: grid;
      gap: 22px;
      letter-spacing: 1.2px;
    }
    .hero__title {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(34px, 6vw, 64px);
      font-weight: 700;
      text-transform: uppercase;
    }
    .hero__btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 26px;
      border: 2px solid var(--accent);
      color: #fff;
      background: transparent;
      border-radius: 10px;
      font-size: 15px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: transform .15s ease, background .2s ease;
    }
        .hero__btn:hover { background: rgba(255,255,255,0.08); transform: translateY(-1px); }
        .hero__footer { position: absolute; bottom: 32px; width: 100%; text-align: center; color: #eaeaea; font-size: 13px; letter-spacing: 0.2em; }
        
        @media (max-width: 720px) {
          .hero__title { font-size: clamp(32px, 10vw, 48px); }
          .hero__btn { width: 100%; justify-content: center; }
        }
      </style>
    </head>
    <body>
      <section class="hero">
        <div class="hero__content">
          <div class="hero__title" id="heroTitle">álbum de promoción 5 to D</div>
          <a href="gallery.html" class="hero__btn">VER GALERÍA</a>
        </div>
        <div class="hero__footer" id="heroFooter">BVH3 INDUSTRIES</div>
      </section>
    </body>
    </html>
