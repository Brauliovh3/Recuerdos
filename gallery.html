  <script type="module">
    const CATBOX_API = 'https://catbox.moe/user/api.php';
    const API_GET_GALLERY = './api/get-gallery.js';
    const API_ADD_ENTRY = './api/add-entry.js';

    const dz = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const progressEl = document.getElementById('progress');
    const bar = progressEl.querySelector('div');
    const gallery = document.getElementById('gallery');
    const empty = document.getElementById('empty');
    const copyLink = document.getElementById('copyLink');

    let queue = [];

    // --- UI & Event Listeners ---

    function setDragging(state) {
      dz.classList.toggle('dragging', state);
    }

    dz.addEventListener('dragover', (e) => { e.preventDefault(); setDragging(true); });
    dz.addEventListener('dragleave', () => setDragging(false));
    dz.addEventListener('drop', (e) => {
      e.preventDefault();
      setDragging(false);
      const files = Array.from(e.dataTransfer.files);
      addToQueue(files);
    });

    fileInput.addEventListener('change', (e) => {
      const files = Array.from(e.target.files);
      addToQueue(files);
    });

    uploadBtn.addEventListener('click', () => uploadAll());

    copyLink.addEventListener('click', async () => {
      await navigator.clipboard.writeText(location.href);
      copyLink.textContent = '¡Copiado!';
      setTimeout(() => copyLink.textContent = 'Copiar enlace público', 1200);
    });

    function addToQueue(files) {
      queue.push(...files);
      renderQueueHint();
    }

    function renderQueueHint() {
      dz.querySelector('strong').textContent = queue.length
        ? `${queue.length} archivo(s) en cola`
        : 'Añadir archivos';
      uploadBtn.style.display = queue.length ? 'inline-flex' : 'none';
    }

    // --- Core Logic ---

    async function uploadToCatbox(file, onProgress) {
      const formData = new FormData();
      formData.append('reqtype', 'fileupload');
      formData.append('fileToUpload', file);

      const response = await fetch(CATBOX_API, {
        method: 'POST',
        body: formData,
      });

      if (!response.ok) {
        throw new Error(`Catbox upload failed: ${response.statusText}`);
      }

      const url = await response.text();
      if (!url.startsWith('https://')) {
        throw new Error(`Invalid response from Catbox: ${url}`);
      }
      return url;
    }

    async function addGalleryEntry(entry) {
      const response = await fetch(API_ADD_ENTRY, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(entry),
      });

      if (!response.ok) {
        throw new Error(`Failed to add gallery entry: ${await response.text()}`);
      }
      return await response.json();
    }

    async function uploadAll() {
      progressEl.hidden = false;
      bar.style.width = '0%';
      const totalFiles = queue.length;

      for (let i = 0; i < totalFiles; i++) {
        const file = queue[i];
        try {
          // 1. Upload to Catbox
          const catboxUrl = await uploadToCatbox(file);

          // 2. Add entry to our gallery DB
          await addGalleryEntry({
            url: catboxUrl,
            pathname: file.name,
            contentType: file.type,
            size: file.size,
          });

          // Update progress bar
          const percent = ((i + 1) / totalFiles) * 100;
          bar.style.width = `${percent}%`;

        } catch (error) {
          console.error(`Failed to upload ${file.name}:`, error);
          alert(`Error subiendo "${file.name}": ${error.message}`);
        }
      }

      // Reset queue and UI
      queue = [];
      renderQueueHint();
      setTimeout(() => {
        progressEl.hidden = true;
        bar.style.width = '0%';
      }, 800);

      // Refresh gallery
      await loadGallery();
    }

    async function loadGallery() {
      try {
        const response = await fetch(API_GET_GALLERY);
        if (!response.ok) throw new Error('Could not fetch gallery.');
        const entries = await response.json();

        // Clear existing gallery items
        gallery.querySelectorAll('.tile:not(#dropzone)').forEach(t => t.remove());

        empty.hidden = entries.length > 0;

        entries.forEach(entry => {
          const tile = createTile(entry);
          gallery.appendChild(tile);
        });

      } catch (error) {
        console.error('Error loading gallery:', error);
        alert('No se pudo cargar la galería.');
      }
    }
    
    function createTile(entry) {
        const tile = document.createElement('div');
        tile.className = 'tile';

        let media;
        if (entry.contentType.startsWith('image/')) {
            media = document.createElement('img');
            media.src = entry.url;
        } else if (entry.contentType.startsWith('video/')) {
            media = document.createElement('video');
            media.src = entry.url;
            media.controls = true;
            media.playsInline = true;
        }
        
        if (media) {
            media.alt = entry.pathname;
            tile.appendChild(media);
        }

        const meta = document.createElement('div');
        meta.className = 'meta';

        const metaTop = document.createElement('div');
        metaTop.className = 'meta-top';

        const note = document.createElement('span');
        note.className = 'note';
        note.textContent = entry.pathname;
        note.title = entry.pathname;

        const size = document.createElement('span');
        size.className = 'size';
        size.textContent = (entry.size / 1024 / 1024).toFixed(1) + ' MB';

        const date = document.createElement('span');
        date.className = 'date';
        date.textContent = new Date(entry.uploadedAt).toLocaleDateString();

        metaTop.appendChild(note);
        metaTop.appendChild(date);
        metaTop.appendChild(size);

        const downloadLink = document.createElement('a');
        downloadLink.href = entry.url;
        downloadLink.target = '_blank'; // Open in new tab
        downloadLink.rel = 'noopener noreferrer';
        downloadLink.textContent = 'Descargar';

        meta.appendChild(metaTop);
        meta.appendChild(downloadLink);
        tile.appendChild(meta);
        return tile;
    }

    // Initial Load
    loadGallery();
  </script>
